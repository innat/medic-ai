name: Docs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sphinx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Build Sphinx docs (local check)
        run: |
          pip install -r docs/requirements.txt
          pip install -e .
          sphinx-build -n -W -b html docs docs/_build/html
